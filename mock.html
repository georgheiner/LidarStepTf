<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LiDAR Scanner - MOCK</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef6f5;--green:#0f9d8a;
  --panel:#ffffffcc;--border:#b7d7d4;--text:#153636;
  --muted:#53706e;--canvas:#081719;
}
body{
  background:radial-gradient(circle at top left,#ffffff 0%,#eef6f5 45%,#d9ebe8 100%);color:var(--text);
  font-family:Georgia,'Avenir Next',serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:14px 10px;gap:12px;
  user-select:none
}
body[data-theme="dark"]{
  --bg:#071517;--green:#5ae0c1;
  --panel:#0f2427cc;--border:#21484d;--text:#d4f1eb;
  --muted:#86aca8;--canvas:#081719;
  background:radial-gradient(circle at top left,#16343a 0%,#081719 52%,#051113 100%);
}
.topbar{
  width:min(1080px,100%);display:flex;justify-content:space-between;align-items:center;gap:12px
}
header{
  display:flex;align-items:center;gap:10px;
  color:var(--green);font-size:.85rem;letter-spacing:.32em;
  text-shadow:0 0 18px rgba(15,157,138,.25)
}
.blink{animation:blink 1.1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.btn{border:none;border-radius:999px;padding:10px 14px;cursor:pointer;background:var(--panel);color:var(--text);border:1px solid var(--border)}
#mockBadge{
  background:#fff4de;border:1px solid #efcf8f;border-radius:999px;
  padding:4px 12px;font-size:.65rem;color:#8a6721;letter-spacing:.15em
}
#layout{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
canvas{display:block;border-radius:50%;background:#030310;
       box-shadow:0 0 60px #00ff4414,0 0 120px #00ff440a}
#panel{width:185px;display:flex;flex-direction:column;gap:9px;min-width:160px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:11px;backdrop-filter:blur(10px)}
.card-hd{font-size:.58rem;letter-spacing:.22em;color:#3d5548;
         border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:7px}
.row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:.7rem}
.lbl{color:var(--muted)} .val{color:var(--text);font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.live{background:var(--green);box-shadow:0 0 8px var(--green);
          animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
#conn{display:flex;align-items:center;gap:8px;font-size:.7rem}
.leg{display:flex;align-items:center;gap:8px;font-size:.64rem;padding:2px 0}
.legdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#alertBar{
  width:100%;max-width:640px;background:#fff1ec;
  border:1px solid #f0c0b2;border-radius:10px;
  padding:5px 14px;font-size:.72rem;color:#8a3b2f;
  opacity:0;transition:opacity .3s;text-align:center
}
#alertBar.show{opacity:1}
#rangeSlider{width:100%;accent-color:var(--green);cursor:pointer;margin-top:4px}
#mockControls label{font-size:.65rem;color:#4a7060;display:flex;flex-direction:column;gap:3px}
#mockControls input[type=range]{width:100%;accent-color:#ffaa44;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <header><span class="blink">◉</span><span>LIDAR ROOM SCANNER</span></header>
  <button id="themeBtn" class="btn" type="button">Dark Mode</button>
</div>
<div id="mockBadge">SIMULATION MODE</div>
<div id="alertBar">MOTION DETECTED</div>

<div id="layout">
  <canvas id="cv" width="560" height="560"></canvas>

  <div id="panel">

    <div class="card">
      <div class="card-hd">CONNECTION</div>
      <div id="conn">
        <div class="dot live" id="dot"></div>
        <span id="connTxt">MOCK / LOCAL</span>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">SCAN STATUS</div>
      <div class="row"><span class="lbl">RATE</span>   <span class="val" id="sRate">- Hz</span></div>
      <div class="row"><span class="lbl">ANGLE</span>  <span class="val" id="sAngle">0.0 deg</span></div>
      <div class="row"><span class="lbl">POINTS</span> <span class="val" id="sPts">-</span></div>
      <div class="row"><span class="lbl">NEAREST</span><span class="val" id="sNear">- cm</span></div>
      <div class="row"><span class="lbl">FARTHEST</span><span class="val" id="sFar">- cm</span></div>
    </div>

    <div class="card">
      <div class="card-hd">MOTION</div>
      <div class="row"><span class="lbl">CHANGES</span>  <span class="val" id="sMotion">0</span></div>
      <div class="row"><span class="lbl">THRESHOLD</span><span class="val">20 cm</span></div>
    </div>

    <div class="card">
      <div class="card-hd">DISPLAY RANGE</div>
      <div class="row"><span class="lbl">MAX</span><span class="val" id="sMaxDist">600 cm</span></div>
      <input type="range" id="rangeSlider" min="100" max="1200" step="50" value="600">
    </div>

    <div class="card" id="mockControls">
      <div class="card-hd">MOCK SETTINGS</div>
      <label>Room width (cm)
        <input type="range" id="mRoomW" min="100" max="1000" step="50" value="500">
        <span class="val" id="mRoomWVal">500 cm</span>
      </label>
      <br>
      <label>Room depth (cm)
        <input type="range" id="mRoomD" min="100" max="1000" step="50" value="350">
        <span class="val" id="mRoomDVal">350 cm</span>
      </label>
      <br>
      <label>Moving objects
        <input type="range" id="mObjs" min="0" max="3" step="1" value="1">
        <span class="val" id="mObjsVal">1</span>
      </label>
      <br>
      <label>Scan speed
        <input type="range" id="mSpeed" min="0.2" max="3" step="0.1" value="1">
        <span class="val" id="mSpeedVal">1.0 rev/s</span>
      </label>
    </div>

    <div class="card">
      <div class="card-hd">LEGEND</div>
      <div class="leg"><div class="legdot" style="background:#00ff88;box-shadow:0 0 4px #00ff88"></div><span>Static object</span></div>
      <div class="leg"><div class="legdot" style="background:#ff8800;box-shadow:0 0 5px #ff8800"></div><span>Slow motion (&gt;20 cm)</span></div>
      <div class="leg"><div class="legdot" style="background:#ff3344;box-shadow:0 0 6px #ff3344"></div><span>Fast motion (&gt;60 cm)</span></div>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';

function applyTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem('lidar-mock-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
}

applyTheme(localStorage.getItem('lidar-mock-theme') || 'light');
document.getElementById('themeBtn').addEventListener('click', function() {
  applyTheme(document.body.dataset.theme === 'dark' ? 'light' : 'dark');
});

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height, CX = W/2, CY = H/2, R = W/2-14;
const BINS = 360, HIST = 6, MOTION_LO = 20, MOTION_HI = 60;

let maxDist = 600;
let history = [];
let prevScanTs = 0;
let roomW = 500;
let roomD = 350;
let numObjs = 1;
let scanRevPerSec = 1.0;

const MAX_OBJS = 3;
const objects = [];

function resetObjects() {
  objects.length = 0;
  for (let i = 0; i < MAX_OBJS; i++) {
    objects.push({
      x: (Math.random() * 2 - 1) * roomW * 0.6,
      y: Math.random() * roomD * 0.6 + 40,
      vx: (Math.random() * 2 - 1) * 60,
      vy: (Math.random() * 2 - 1) * 60,
      r: 20 + Math.random() * 15
    });
  }
}
resetObjects();

function raycast(angleDeg) {
  const rad = angleDeg * Math.PI / 180;
  const dx = Math.sin(rad);
  const dy = Math.cos(rad);
  let minDist = 1200;

  const walls = [
    { nx:0, ny:1, d: roomD },
    { nx:0, ny:-1, d: roomD },
    { nx:1, ny:0, d: roomW },
    { nx:-1, ny:0, d: roomW },
  ];

  for (const w of walls) {
    const denom = dx * w.nx + dy * w.ny;
    if (denom <= 0) continue;
    const t = w.d / denom;
    if (t > 0 && t < minDist) minDist = t;
  }

  for (let i = 0; i < numObjs; i++) {
    const o = objects[i];
    const fx = o.x, fy = o.y;
    const proj = fx * dx + fy * dy;
    if (proj <= 0) continue;
    const perpSq = (fx - proj * dx) * (fx - proj * dx) +
                   (fy - proj * dy) * (fy - proj * dy);
    if (perpSq > o.r * o.r) continue;
    const t = proj - Math.sqrt(o.r * o.r - perpSq);
    if (t > 0 && t < minDist) minDist = t;
  }

  const noise = (Math.random() + Math.random() - 1) * 3;
  return Math.max(30, Math.min(1200, Math.round(minDist + noise)));
}

function generateScan() {
  const dist = new Array(BINS);
  for (let i = 0; i < BINS; i++) dist[i] = raycast(i);
  return dist;
}

let lastPhysicsT = 0;
function updatePhysics(t) {
  if (!lastPhysicsT) { lastPhysicsT = t; return; }
  const dt = Math.min((t - lastPhysicsT) / 1000, 0.1);
  lastPhysicsT = t;

  for (let i = 0; i < numObjs; i++) {
    const o = objects[i];
    o.x += o.vx * dt;
    o.y += o.vy * dt;
    const margin = o.r + 10;
    if (o.x < -roomW + margin) { o.x = -roomW + margin; o.vx = Math.abs(o.vx); }
    if (o.x >  roomW - margin) { o.x =  roomW - margin; o.vx = -Math.abs(o.vx); }
    if (o.y <  30 + margin)    { o.y =  30 + margin;    o.vy = Math.abs(o.vy); }
    if (o.y >  roomD - margin) { o.y =  roomD - margin; o.vy = -Math.abs(o.vy); }
  }
}

function toXY(deg, cm) {
  const r = (cm / maxDist) * R;
  const a = (deg - 90) * Math.PI / 180;
  return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
}

function sRad(deg) { return (deg - 90) * Math.PI / 180; }

function drawGrid() {
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.fillStyle='#030310'; ctx.fill();

  for (let i = 1; i <= 5; i++) {
    const r = R * i / 5;
    const d = Math.round(maxDist * i / 5);
    ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2);
    ctx.strokeStyle='#00ff4416'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#00ff4445'; ctx.font='10px Courier New';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(d+'cm', CX+r+3, CY-4);
  }

  for (let a = 0; a < 360; a += 30) {
    const rad = sRad(a);
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.lineTo(CX+R*Math.cos(rad), CY+R*Math.sin(rad));
    ctx.strokeStyle='#00ff4410'; ctx.lineWidth=1; ctx.stroke();
    const lr = R+16;
    ctx.fillStyle='#00ff4455'; ctx.font='10px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(a+'deg', CX+lr*Math.cos(rad), CY+lr*Math.sin(rad));
  }

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='#00ff4430'; ctx.lineWidth=1.5; ctx.stroke();
}

function drawSweep(angleDeg) {
  const tail = 50;
  const rad = sRad(angleDeg);
  ctx.beginPath(); ctx.moveTo(CX,CY);
  ctx.arc(CX,CY,R, sRad(angleDeg-tail), rad);
  ctx.closePath();
  ctx.fillStyle='#00ff440b'; ctx.fill();

  const ex=CX+R*Math.cos(rad), ey=CY+R*Math.sin(rad);
  const g=ctx.createLinearGradient(CX,CY,ex,ey);
  g.addColorStop(0,'#00ff4400'); g.addColorStop(.5,'#00ff4455'); g.addColorStop(1,'#00ff44cc');
  ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(ex,ey);
  ctx.strokeStyle=g; ctx.lineWidth=2; ctx.stroke();
}

function motionScore(dist, bin, prevHist) {
  let m = 0;
  for (const h of prevHist) {
    if (!h) continue;
    const pd = h[bin];
    if (!dist || !pd) continue;
    const d = Math.abs(dist - pd);
    if (d > m) m = d;
  }
  return m;
}

function drawPoints(cur, prevHist) {
  for (let i = 0; i < BINS; i++) {
    const d = cur[i];
    if (!d || d > maxDist) continue;
    const sc = motionScore(d, i, prevHist);
    let col, glo, sz;
    if      (sc >= MOTION_HI) { col='#ff3344'; glo='#ff000055'; sz=4; }
    else if (sc >= MOTION_LO) { col='#ff8800'; glo='#ff440038'; sz=3; }
    else                      { col='#00ff88'; glo='#00ff4425'; sz=2; }
    const [x,y] = toXY(i,d);
    ctx.beginPath(); ctx.arc(x,y,sz+4,0,Math.PI*2); ctx.fillStyle=glo; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2);   ctx.fillStyle=col; ctx.fill();
  }
}

function drawCenter() {
  ctx.beginPath(); ctx.arc(CX,CY,5,0,Math.PI*2);
  ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=14;
  ctx.fill(); ctx.shadowBlur=0;
}

function render(sweepAngle) {
  ctx.clearRect(0,0,W,H);
  drawGrid();
  drawSweep(sweepAngle);
  if (history.length > 0) {
    const cur = history[history.length-1];
    const prevHist = history.slice(0,-1).reverse();
    drawPoints(cur, prevHist);
  }
  drawCenter();
}

let sweepAngle = 0;
let lastFrameT = 0;
let scanAccumDeg = 0;

function frame(ts) {
  requestAnimationFrame(frame);
  if (!lastFrameT) lastFrameT = ts;
  const dt = Math.min((ts - lastFrameT) / 1000, 0.1);
  lastFrameT = ts;

  updatePhysics(ts);

  const degPerSec = scanRevPerSec * 360;
  const dAngle = degPerSec * dt;
  sweepAngle = (sweepAngle + dAngle) % 360;
  scanAccumDeg += dAngle;

  document.getElementById('sAngle').textContent = sweepAngle.toFixed(1) + 'deg';

  if (scanAccumDeg >= 360) {
    scanAccumDeg -= 360;

    const now = Date.now();
    if (prevScanTs) {
      const hz = (1000 / (now - prevScanTs)).toFixed(2);
      document.getElementById('sRate').textContent = hz + ' Hz';
    }
    prevScanTs = now;

    const scan = generateScan();
    history.push(scan);
    if (history.length > HIST) history.shift();

    const valid = scan.filter(v => v > 0 && v <= 1200);
    document.getElementById('sPts').textContent = valid.length;
    if (valid.length) {
      document.getElementById('sNear').textContent = Math.min(...valid) + ' cm';
      document.getElementById('sFar').textContent = Math.max(...valid) + ' cm';
    }

    let mPts = 0;
    if (history.length >= 2) {
      const prev = history[history.length-2];
      for (let i = 0; i < BINS; i++) {
        if (scan[i] && prev[i] && Math.abs(scan[i]-prev[i]) >= MOTION_LO) mPts++;
      }
    }

    document.getElementById('sMotion').textContent = mPts;
    const bar = document.getElementById('alertBar');
    if (mPts > 5) {
      bar.textContent = 'MOTION DETECTED - ' + mPts + ' sectors changed';
      bar.classList.add('show');
    } else {
      bar.classList.remove('show');
    }
  }

  render(sweepAngle);
}
requestAnimationFrame(frame);

document.getElementById('rangeSlider').addEventListener('input', function(){
  maxDist = parseInt(this.value, 10);
  document.getElementById('sMaxDist').textContent = maxDist + ' cm';
});

document.getElementById('mRoomW').addEventListener('input', function(){
  roomW = parseInt(this.value, 10);
  document.getElementById('mRoomWVal').textContent = roomW + ' cm';
  resetObjects();
});
document.getElementById('mRoomD').addEventListener('input', function(){
  roomD = parseInt(this.value, 10);
  document.getElementById('mRoomDVal').textContent = roomD + ' cm';
  resetObjects();
});
document.getElementById('mObjs').addEventListener('input', function(){
  numObjs = parseInt(this.value, 10);
  document.getElementById('mObjsVal').textContent = numObjs;
  resetObjects();
});
document.getElementById('mSpeed').addEventListener('input', function(){
  scanRevPerSec = parseFloat(this.value);
  document.getElementById('mSpeedVal').textContent = scanRevPerSec.toFixed(1) + ' rev/s';
});

})();
</script>
</body>
</html>
