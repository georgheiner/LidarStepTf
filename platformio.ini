; ═══════════════════════════════════════════════════════════════════════════════
;  LiDAR Room Scanner
;  Board  : ESP32 DevKit V1 (30-pin)
;  Sensor : TFMini UART  → GPIO16 (RX2), GPIO17 (TX2)
;  Motor  : NEMA 17 + generic STEP/DIR driver (default pins in src/app_config.h)
;           Final gearing, direction, and microstepping are configured in src/app_config.h
; ═══════════════════════════════════════════════════════════════════════════════

[env:esp32doit-devkit-v1]
platform     = espressif32
board        = esp32doit-devkit-v1
framework    = arduino
monitor_speed = 115200

lib_deps =
    ; Async TCP + WebServer (ESP32 flavour)
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    ; Stepper acceleration engine (uses ESP32 RMT / MCPWM)
    gin66/FastAccelStepper@^0.30.10
    knolleary/PubSubClient@^2.8

build_flags =
    -DCORE_DEBUG_LEVEL=0          ; suppress ESP-IDF noise on Serial
